name: Daily Investment News

on:
  schedule:
    - cron: '0 2,13 * * *'
  workflow_dispatch:

jobs:
  run-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # เพิ่ม gtts และ mutagen เข้าไปตรงนี้ครับ
        run: pip install requests feedparser google-genai yfinance gTTS mutagen pytz

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      - name: Send Alert on Failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
          -d '{
            "to": "'"$LINE_USER_ID"'",
            "messages": [{"type": "text", "text": "⚠️ แจ้งเตือน: ระบบสรุปข่าวเช้านี้ขัดข้อง กรุณาตรวจสอบใน GitHub Actions"}]
          }'

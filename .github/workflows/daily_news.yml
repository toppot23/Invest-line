name: Daily Investment News

on:
  schedule:
    - cron: '0 2,13 * * *' # เวลา 02:00 UTC = 09:00 น. เวลาไทย
  workflow_dispatch: # อนุญาตให้กดรันเองแบบแมนนวลได้

jobs:
  run-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # ป้องกันระบบค้างเกิน 10 นาที
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests feedparser google-genai yfinance

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      # ส่งแจ้งเตือนเข้า LINE หากระบบทำงานล้มเหลว
      - name: Send Alert on Failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
          -d '{
            "to": "'"$LINE_USER_ID"'",
            "messages": [{"type": "text", "text": "⚠️ แจ้งเตือน: ระบบสรุปข่าวเช้านี้ขัดข้อง กรุณาตรวจสอบใน GitHub Actions"}]
          }'
